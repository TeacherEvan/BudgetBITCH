name: Release Automation

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release Draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build & tests pass before release
        run: |
          npm test -- --run
          npm run test:convex
          npm run build
        env:
          NEXT_PUBLIC_CONVEX_URL: https://ci-build.convex.cloud
          NEXT_PUBLIC_CONVEX_SITE_URL: https://ci-build.convex.site
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          SITE_URL: http://localhost:3000

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
