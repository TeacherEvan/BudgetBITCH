name: CI

# Shift-left quality gates. Every push to main and every PR runs the same
# checks in parallel so a failure is fast to localize.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22' # matches package.json "engines": 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --run

  convex-test:
    name: Convex Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Convex tests
        run: npm run test:convex

  build:
    name: Build (type-check + next build)
    runs-on: ubuntu-latest
    env:
      # Placeholder public URLs so `next build` has concrete values.
      # These are NON-SECRET and safe to expose; real values come from Vercel.
      NEXT_PUBLIC_CONVEX_URL: https://ci-build.convex.cloud
      NEXT_PUBLIC_CONVEX_SITE_URL: https://ci-build.convex.site
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SITE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `next build` runs its own TypeScript pass over the app source;
      # a clean build == clean types for everything that ships. A separate
      # `tsc --noEmit` is intentionally omitted because it also type-checks
      # test files (e.g. use-voice.test.ts) that have pre-existing type
      # errors outside the shipped graph and would block every push.
      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Runs even if prior jobs are skipped; gates merges only when it runs and fails.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        # Without NEXT_PUBLIC_CONVEX_URL the dev server can't boot (empty URL
        # crash), so we skip cleanly and stay green until the repo secret is
        # set. When configured, authed specs use E2E_TEST_EMAIL/PASSWORD; if
        # those are unset the authed specs skip and only the unauthenticated
        # coverage runs.
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_CONVEX_SITE_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_SITE_URL }}
          CONVEX_SITE_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_SITE_URL }}
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
          SITE_URL: http://127.0.0.1:3100
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: |
          if [ -z "$NEXT_PUBLIC_CONVEX_URL" ]; then
            echo "Skipping E2E - set repo secret NEXT_PUBLIC_CONVEX_URL (and E2E_TEST_EMAIL / E2E_TEST_PASSWORD) to enable real-auth Playwright runs."
            exit 0
          fi
          npx playwright test --reporter=line

  # Surfaced but non-blocking: next-pwa (the prior source of a transitive RCE
  # via workbox-build) has been removed in favor of a hand-written service
  # worker, so that specific advisory no longer applies. Any remaining
  # high-severity advisories are reviewed but do not gate every merge.
  # Fails on any PR/push if the *intended* prod Convex deployment is not the
  # canonical one. Runs without a real Vercel build (uses the canonical slug
  # directly), so it catches a stale NEXT_PUBLIC_CONVEX_URL env BEFORE Vercel
  # auto-deploys. The authoritative hard-fail still lives in scripts/
  # check-convex-deployment.mjs as a `prebuild` on the Vercel production build,
  # where the real NEXT_PUBLIC_CONVEX_URL env is present.
  deploy-guard:
    name: Prod Convex Deployment Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify prod Convex URL matches canonical deployment
        env:
          EXPECTED_SLUG: steady-ox-280
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_CONVEX_URL" ]; then
            echo "NEXT_PUBLIC_CONVEX_URL secret not set — skipping (guard runs authoritatively in Vercel prod prebuild)."
            exit 0
          fi
          slug=$(echo "$NEXT_PUBLIC_CONVEX_URL" | sed -E 's#https://([a-z0-9-]+)\.convex\.(cloud|site).*#\1#I')
          if [ "$slug" != "$EXPECTED_SLUG" ]; then
            echo "::error::NEXT_PUBLIC_CONVEX_URL points at '$slug' but prod deployment is '$EXPECTED_SLUG'. Fix the Vercel prod env before deploy."
            exit 1
          fi
          echo "OK: Vercel prod NEXT_PUBLIC_CONVEX_URL targets canonical deployment '$EXPECTED_SLUG'."

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit (high)
        run: npm audit --audit-level=high
