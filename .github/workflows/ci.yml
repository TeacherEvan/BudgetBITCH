name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22' # matches package.json "engines": 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      # next build runs its own TypeScript pass; a clean build == clean types.
      - name: Build
        env:
          # Placeholder public URLs so `next build` has concrete values.
          # These are NON-SECRET and safe to expose; real values come from Vercel.
          NEXT_PUBLIC_CONVEX_URL: https://ci-build.convex.cloud
          NEXT_PUBLIC_CONVEX_SITE_URL: https://ci-build.convex.site
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          SITE_URL: http://localhost:3000
        run: npm run build
