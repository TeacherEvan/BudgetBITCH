name: CI

# Shift-left quality gates. Every push to main and every PR runs the same
# checks in parallel so a failure is fast to localize.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22' # matches package.json "engines": 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --run

  convex-test:
    name: Convex Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Convex tests
        run: npm run test:convex

  build:
    name: Build (type-check + next build)
    runs-on: ubuntu-latest
    env:
      # Placeholder public URLs so `next build` has concrete values.
      # These are NON-SECRET and safe to expose; real values come from Vercel.
      NEXT_PUBLIC_CONVEX_URL: https://ci-build.convex.cloud
      NEXT_PUBLIC_CONVEX_SITE_URL: https://ci-build.convex.site
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SITE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `next build` runs its own TypeScript pass over the app source;
      # a clean build == clean types for everything that ships. A separate
      # `tsc --noEmit` is intentionally omitted because it also type-checks
      # test files (e.g. use-voice.test.ts) that have pre-existing type
      # errors outside the shipped graph and would block every push.
      - name: Build
        run: npm run build

  # Surfaced but non-blocking: next-pwa (the prior source of a transitive RCE
  # via workbox-build) has been removed in favor of a hand-written service
  # worker, so that specific advisory no longer applies. Any remaining
  # high-severity advisories are reviewed but do not gate every merge.
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit (high)
        run: npm audit --audit-level=high
